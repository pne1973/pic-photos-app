<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Feedback Hub v34.05</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-blue: #0088cc;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-sec: #8e8e93;
            --accent: #34c759;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #131313;
                --card-bg: #1c1c1e;
                --text-main: #ffffff;
                --text-sec: #a1a1aa;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Top Navigation */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .balance-pill { background: var(--tg-blue); color: white; padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: 14px; box-shadow: 0 2px 8px rgba(0,136,204,0.3); }
        
        /* Progress System */
        .progress-wrapper { width: 100%; height: 6px; background: rgba(0,0,0,0.1); border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--tg-blue); width: 0%; transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .instruction { text-align: center; font-size: 16px; font-weight: 600; margin-bottom: 15px; min-height: 40px; color: var(--text-sec); }

        /* GRID: Side-by-Side Images */
        .compare-grid {
            display: flex;
            flex-direction: row;
            gap: 12px;
            flex-grow: 1;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 0.4s ease;
            max-height: 60vh;
        }

        .image-card {
            flex: 1;
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            border: 3px solid transparent;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            transition: transform 0.1s, border-color 0.2s;
            cursor: pointer;
            display: flex;
        }

        .image-card:active { transform: scale(0.96); border-color: var(--tg-blue); }
        .image-card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        .label {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white;
            padding: 4px 12px; border-radius: 8px; font-size: 11px; font-weight: bold;
            backdrop-filter: blur(4px);
        }

        /* AD OVERLAY / BONUS SCREEN */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; padding: 25px;
        }
        
        .ad-box {
            background: var(--card-bg); border-radius: 24px; padding: 25px;
            width: 90%; max-width: 350px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .btn-claim {
            background: var(--tg-blue); color: white; border: none;
            padding: 16px; border-radius: 14px; font-size: 18px;
            font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%;
            transition: background 0.2s;
        }
        .btn-claim:active { background: #0077b3; }

        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--text-sec); font-weight: 500; }
    </style>
</head>
<body>

    <div class="header">
        <span style="letter-spacing: 0.5px; opacity: 0.9;">AI TRAINER</span>
        <div class="balance-pill" id="balanceDisplay">0 XP</div>
    </div>

    <div class="progress-wrapper"><div class="progress-bar" id="progressBar"></div></div>

    <div class="instruction" id="questionText">Fetching AI Data...</div>

    <div id="loader">Syncing...</div>

    <div class="compare-grid" id="gameArea">
        <div class="image-card" onclick="castVote('A')">
            <img id="imgA" src="">
            <div class="label">OPTION A</div>
        </div>
        <div class="image-card" onclick="castVote('B')">
            <img id="imgB" src="">
            <div class="label">OPTION B</div>
        </div>
    </div>

    <div class="overlay" id="adOverlay">
        <div class="ad-box">
            <div style="font-size: 40px; margin-bottom: 10px;">⚡</div>
            <h2 style="margin: 0; font-size: 22px;">Bonus Unlocked!</h2>
            <p style="color: var(--text-sec); font-size: 14px; line-height: 1.5; margin: 15px 0;">
                Complete this quick verification to claim your <b>250 XP reward</b> and unlock the next round of tasks.
            </p>
            
            <div style="background: rgba(0,136,204,0.1); border: 1px dashed var(--tg-blue); padding: 12px; border-radius: 10px; margin-bottom: 15px;">
                <span style="font-size: 12px; color: var(--tg-blue); font-weight: bold;">ADVERTISER OFFER</span>
                <p style="font-size: 13px; margin: 5px 0 0 0;">Check out the latest AI tools and earn extra points.</p>
            </div>

            <button class="btn-claim" onclick="openAdLink()">CLAIM 250 XP</button>
            <p style="font-size: 11px; color: #999; margin-top: 12px;">Rewards are processed instantly after click.</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const ADSTERRA_URL = "https://www.google.com"; // REPLACE WITH YOUR ADSTERRA DIRECT LINK
        
        let sessionVotes = 0;
        let totalXP = 0;
        let imagesLoaded = 0;

        const questions = [
            "Which AI render is more realistic?",
            "Which UI design is cleaner?",
            "Which photo has better lighting?",
            "Which logo feels more modern?",
            "Which portrait is more natural?"
        ];

        function checkBothLoaded() {
            imagesLoaded++;
            if (imagesLoaded >= 2) {
                document.getElementById('gameArea').style.opacity = 1;
                document.getElementById('loader').style.display = 'none';
            }
        }

        function loadNewPair() {
            imagesLoaded = 0;
            document.getElementById('gameArea').style.opacity = 0;
            document.getElementById('loader').style.display = 'block';

            // Using stable IDs from Unsplash via Picsum for Vercel stability
            const randA = Math.floor(Math.random() * 50) + 1;
            const randB = Math.floor(Math.random() * 50) + 60;
            
            const imgA = document.getElementById('imgA');
            const imgB = document.getElementById('imgB');

            imgA.src = `https://picsum.photos/id/${randA}/600/900`;
            imgB.src = `https://picsum.photos/id/${randB}/600/900`;

            imgA.onload = checkBothLoaded;
            imgB.onload = checkBothLoaded;
            
            imgA.onerror = () => { imgA.src = "https://placehold.co/600x900?text=Error+A"; checkBothLoaded(); };
            imgB.onerror = () => { imgB.src = "https://placehold.co/600x900?text=Error+B"; checkBothLoaded(); };

            const qIndex = Math.floor(Math.random() * questions.length);
            document.getElementById('questionText').innerText = questions[qIndex];
        }

        function castVote(choice) {
            tg.HapticFeedback.impactOccurred('light');
            sessionVotes++;
            
            let progress = (sessionVotes % 5) * 20;
            if (sessionVotes % 5 === 0 && sessionVotes !== 0) progress = 100;
            document.getElementById('progressBar').style.width = progress + "%";

            if (sessionVotes % 5 === 0) {
                setTimeout(() => {
                    document.getElementById('adOverlay').style.display = 'flex';
                }, 300);
            } else {
                loadNewPair();
            }
        }

        function openAdLink() {
            window.open(ADSTERRA_URL, '_blank');
            
            // UI Reward Update
            totalXP += 250;
            document.getElementById('balanceDisplay').innerText = totalXP + " XP";
            document.getElementById('adOverlay').style.display = 'none';
            document.getElementById('progressBar').style.width = "0%";
            
            loadNewPair();
        }

        // Boot
        tg.ready();
        tg.expand();
        loadNewPair();
    </script>
</body>
</html>
